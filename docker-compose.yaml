version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    env_file: .env
    environment:
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  backend:
    # Added fallback to 'latest' if BUILD_NUMBER isn't set manually
    image: andrewferdi/backend-latest:${BUILD_NUMBER:-latest}
    container_name: backend-api
    env_file: .env
    depends_on:
      - mysql
    ports:
      - "5000:5000"

  frontend:
    image: andrewferdi/frontend-latest:${BUILD_NUMBER:-latest}
    container_name: frontend-react
    ports:
      - "80:80"  # Changed from 3000:3000 to 80:80 so the site is reachable at the IP
    depends_on:
      - backend

volumes:
  mysql-data:
